<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will my luggage fit? · 行李放得下嗎？</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1 id="title">Will my luggage fit?</h1>
        <p class="subtitle" id="subtitle"></p>
      </div>
      <button id="langToggle">中文</button>
    </header>

    <div class="modetabs" role="tablist">
      <button id="modeCarBtn" class="active" role="tab"></button>
      <button id="modeLuggageBtn" role="tab"></button>
    </div>

    <div class="grid">
      <!-- LEFT: inputs -->
      <div>
        <div class="panel" id="carPanel">
          <h2 id="carLabel">Rental car</h2>
          <div class="selrow">
            <select id="brandSelect" aria-label="Brand"></select>
            <select id="carSelect" aria-label="Model"></select>
          </div>
          <div class="carMeta" id="carMeta"></div>
          <div id="customCarWrap" style="display:none">
            <label class="field" id="bootInsideLabel" style="margin-top:10px">Boot inside size</label>
            <div class="customrow" style="grid-template-columns:1fr 1fr 1fr;">
              <div><label class="field" id="cbWLabel">Width</label><input type="number" id="cbW" min="1" value="100" /></div>
              <div><label class="field" id="cbDLabel">Depth</label><input type="number" id="cbD" min="1" value="90" /></div>
              <div><label class="field" id="cbHLabel">Height</label><input type="number" id="cbH" min="1" value="50" /></div>
            </div>
            <label class="field" id="openingLabel" style="margin-top:8px">Boot opening</label>
            <div class="customrow" style="grid-template-columns:1fr 1fr;">
              <div><label class="field" id="coWLabel">Opening W</label><input type="number" id="coW" min="1" value="95" /></div>
              <div><label class="field" id="coHLabel">Opening H</label><input type="number" id="coH" min="1" value="55" /></div>
            </div>
          </div>
          <label class="switch" id="seatsDownWrap">
            <input type="checkbox" id="seatsDown" />
            <span id="seatsDownLabel">Fold rear seats down</span>
          </label>
        </div>

        <div class="panel">
          <h2 id="addPresetLabel">Add a bag</h2>
          <div class="presets" id="presets"></div>
          <div style="margin-top:12px">
            <h2 id="customLabel" style="margin-bottom:6px">Add custom bag</h2>
            <div class="customrow">
              <div><label class="field" id="wLabel">Width</label><input type="number" id="cw" min="1" placeholder="cm" /></div>
              <div><label class="field" id="dLabel">Depth</label><input type="number" id="cd" min="1" placeholder="cm" /></div>
              <div><label class="field" id="hLabel">Height</label><input type="number" id="ch" min="1" placeholder="cm" /></div>
              <button id="addCustomBtn">＋</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <h2 id="yourBagsLabel">Your bags</h2>
          <div id="bagList"></div>
          <div class="actions">
            <button class="btn ghost" id="clearBtn">Clear</button>
          </div>
        </div>
      </div>

      <!-- RIGHT: result + viewer -->
      <div>
        <div class="panel" id="resultPanel">
          <div class="banner idle" id="resultBanner"></div>
          <div id="resultDetail"></div>
        </div>
        <div class="panel viewer" id="viewerPanel">
          <div class="viewtabs">
            <button id="btn3d" class="active">3D</button>
            <button id="btn2d">2D</button>
          </div>
          <button id="saveImgBtn" class="saveimg" title="">⤓</button>
          <div class="viewbox">
            <div id="view3d"></div>
            <canvas id="canvas2d" style="display:none"></canvas>
          </div>
          <div class="dragHint" id="dragHint"></div>
        </div>
        <div class="panel" id="matchesPanel" style="display:none">
          <h2 id="matchesTitleLabel">Cars that fit your bags</h2>
          <div id="matchSummary" class="matchsummary"></div>
          <div id="matchList"></div>
        </div>
        <div class="disclaimer" id="disclaimer"></div>
      </div>
    </div>
  </div>

  <!-- Three.js from CDN (ES module). Sets globals, then signals readiness. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    window.THREE = THREE;
    window.OrbitControls = OrbitControls;
    window.dispatchEvent(new Event("three-ready"));
  </script>

  <!-- App code (classic scripts — work over file:// by double-click) -->
  <script src="js/i18n.js"></script>
  <script src="data/cars.js"></script>
  <script src="js/packing.js"></script>
  <script src="js/viewer.js"></script>
  <script src="js/app.js"></script>

  <!-- PWA service worker (only registers over http/https, not file://) -->
  <script>
    if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
